version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.10"

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

sphinx:
  configuration: documentation/source/conf.py
  fail_on_warning: false

formats: []
